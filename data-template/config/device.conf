# Cihaza ait kalıcı ayarlar burada tutulur. RootFS read-only kaldığı için
# çalışma sırasında değişmesi gereken bilgiler /data altındaki bu dosyadan okunur.
DEVICE_NAME=mini-linux-node-01
ACTIVE_SLOT=a

# Kritik loglar /data/log altında saklanır; normal çalışma logları RAM'de tutulur.
LOG_PERSIST_CRITICAL_ONLY=yes
WATCHDOG_ENABLED=yes
